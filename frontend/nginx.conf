server {
    listen 80;
    server_name _;

    # AI 표지(base64 Data URL)는 수 MB라 기본 1MB 제한을 늘림 (413 방지)
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    location /api/books {
        proxy_pass http://backend:8080/books;
    }

    location /api/auth {
        proxy_pass http://backend:8080/auth;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
