# AWS CodeBuild — EKS 배포 파이프라인
# 흐름: Docker 이미지 빌드 → ECR push → kubectl로 EKS에 배포
#
# ⚠️ 이 buildspec이 동작하려면 CodeBuild 쪽 설정이 필요함:
#   1) CodeBuild 환경: "권한 있음(Privileged)" 모드 ON  ← docker build 하려면 필수
#   2) CodeBuild 서비스 역할 권한: ECR(push), EKS(DescribeCluster) 정책
#   3) EKS RBAC: aws-auth ConfigMap에 CodeBuild 역할 등록 (kubectl 권한)
#      또는 access entry로 CodeBuild 역할에 클러스터 권한 부여

version: 0.2

env:
  variables:
    AWS_REGION: us-west-1
    ECR_REGISTRY: 879772956301.dkr.ecr.us-west-1.amazonaws.com
    ECR_REPO: aivle24_bookapp
    CLUSTER_NAME: aivle24_cluster

phases:
  pre_build:
    commands:
      - echo ">>> ECR 로그인"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_URI=$ECR_REGISTRY/$ECR_REPO
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}   # 커밋 해시를 태그로
      - echo "이미지 - $IMAGE_URI:$IMAGE_TAG"

  build:
    commands:
      - echo ">>> Docker 이미지 빌드 (React + Spring 통합)"
      - docker build -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest .

  post_build:
    commands:
      - echo ">>> ECR push"
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      - echo ">>> EKS 배포 (kubectl)"
      - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
      - kubectl apply -f k8s/bookapp.yaml
      - kubectl set image deployment/bookapp bookapp=$IMAGE_URI:$IMAGE_TAG
      - kubectl rollout status deployment/bookapp --timeout=300s
      - echo ">>> 배포 완료. 외부 접속 주소(EXTERNAL-IP) 확인:"
      - kubectl get svc bookapp-service
