apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 879772956301.dkr.ecr.us-west-1.amazonaws.com/m-6th-t24-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
