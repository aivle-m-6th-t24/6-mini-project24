version: 0.2

phases:
  build:
    commands:
      - echo ">>> EKS prod 배포 시작"
      - aws eks update-kubeconfig --region us-west-1 --name m-6th-t24-cluster
      - kubectl apply -f k8s/prod/
      - kubectl rollout restart deployment/backend -n prod
      - kubectl rollout restart deployment/frontend -n prod
      - kubectl rollout status deployment/backend -n prod --timeout=180s
      - kubectl rollout status deployment/frontend -n prod --timeout=180s
      - echo ">>> EKS prod 배포 완료"
